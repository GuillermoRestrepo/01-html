<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estructura De Un Documento HTML</title>
</head>
<body>
<!--
    <!DOCTYPE>:
        · Define el tipo de documento y su versión.
        · Ayuda a la correcta interpretacion del navegador.

    <html>:
        · Elemento raíz, es decir, encapsula todo el contenido.
        · Define el idioma gracias al atributo "lang".

    <head>: contiene:
        · Metadatos que ayudan a la configuración.
        · Enlaces que se comunican con otros recursos.
        · El título y logo de la pestaña del navegador.

    <body>:
        · Encapsula todo el contenido visible para el usuario.
-->
</body>
</html>
